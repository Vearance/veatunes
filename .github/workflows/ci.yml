name: CI / Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

      - name: Build
        run: bun run build
        env:
          NAVIDROME_URL: http://localhost
          NEXT_PUBLIC_NAVIDROME_URL: http://localhost
          NEXT_PUBLIC_NAVIDROME_USER: test
          NEXT_PUBLIC_NAVIDROME_PASSWORD: test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '~/veatunes' }}
            git pull
            docker compose down
            docker system prune -a --volumes -f
            docker compose up -d --build
